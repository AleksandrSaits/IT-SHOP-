<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 24px;
            color: var(--tg-theme-text-color, #000);
        }

        .product-card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }

        .product-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #40a7e3);
            margin-bottom: 16px;
        }

        button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        .cart-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            left: 24px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-radius: 50px;
            padding: 18px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            cursor: pointer;
            border: none;
            z-index: 1000;
        }

        .cart-count {
            background: #ff3b30;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 14px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <h1>🛍 Интернет-магазин</h1>
    
    <div id="products"></div>
    
    <button class="cart-fab" onclick="showCart()" id="cartButton">
        🛒 Корзина <span class="cart-count" id="cartCount">0</span>
    </button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран
        tg.ready();
        
        // Товары
        const products = [
            { id: 1, name: 'Товар 1', price: 100, desc: 'Описание товара 1' },
            { id: 2, name: 'Товар 2', price: 200, desc: 'Описание товара 2' },
            { id: 3, name: 'Товар 3', price: 300, desc: 'Описание товара 3' },
            { id: 4, name: 'Товар 4', price: 400, desc: 'Описание товара 4' }
        ];
        
        // Корзина
        let cart = [];
        
        // Отображение товаров
        function displayProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-title">${product.name}</div>
                    <div class="product-desc">${product.desc}</div>
                    <div class="product-price">${product.price} ₽</div>
                    <button onclick="addToCart(${product.id})">Добавить в корзину</button>
                `;
                container.appendChild(card);
            });
        }
        
        // Добавление в корзину
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            updateCartCount();
            
            // Вибрация (если поддерживается)
            tg.HapticFeedback.impactOccurred('light');
            
            // Уведомление
            tg.showPopup({
                title: '✅ Успешно!',
                message: `${product.name} добавлен в корзину`,
                buttons: [{ type: 'ok' }]
            });
        }
        
        // Обновление счетчика корзины
        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }
        
        // Показать корзину
        function showCart() {
            if (cart.length === 0) {
                tg.showPopup({
                    title: '🛒 Корзина',
                    message: 'Корзина пуста',
                    buttons: [{ type: 'ok' }]
                });
                return;
            }
            
            let total = 0;
            let message = '';
            
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} - ${item.price}₽\n`;
                total += item.price;
            });
            
            message += `\n💰 Итого: ${total}₽`;
            
            tg.showPopup({
                title: '🛒 Ваша корзина',
                message: message,
                buttons: [
                    { id: 'order', text: 'Оформить заказ' },
                    { id: 'clear', text: 'Очистить', type: 'destructive' },
                    { id: 'cancel', type: 'cancel' }
                ]
            }, (buttonId) => {
                if (buttonId === 'order') {
                    checkout();
                } else if (buttonId === 'clear') {
                    cart = [];
                    updateCartCount();
                }
            });
        }
        
        // Оформление заказа
        function checkout() {
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Отправляем данные боту
            tg.sendData(JSON.stringify({
                type: 'order',
                items: cart,
                total: total,
                date: new Date().toISOString()
            }));
            
            // Очищаем корзину
            cart = [];
            updateCartCount();
            
            tg.showPopup({
                title: '✅ Заказ оформлен!',
                message: 'Скоро с вами свяжутся',
                buttons: [{ type: 'ok' }]
            });
        }
        
        // Запуск
        displayProducts();
        updateCartCount();
        
        // Настройка темы
        tg.setHeaderColor('bg_color');
        tg.backgroundColor = tg.themeParams.bg_color;
        
    </script>
</body>
</html>
